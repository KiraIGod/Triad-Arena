services:
  db:
    image: postgres:15
    container_name: triad-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: triad-server
    restart: always
    depends_on:
      - db
    env_file:
      - .env

  client:
    build: ./client
    container_name: triad-client
    restart: always
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    container_name: triad-nginx
    restart: always
    depends_on:
      - client
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
